<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Dashboard Collaborations Internationales - Nantes Université</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css"
    />
    <style>
      /* On peut ajouter du style pour le chargement ici */
      #loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        background: #f8f9fb;
        flex-direction: column;
      }
      .spinner {
        border: 4px solid rgba(0, 0, 0, 0.1);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border-left-color: #09f;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading">
      <div class="spinner"></div>
      <div>Chargement du Dashboard (Pyodide / stlite)...</div>
      <div style="font-size: 0.8em; color: #666; margin-top: 10px;">Ceci peut prendre quelques secondes au premier chargement.</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["plotly", "pandas", "pyarrow", "pycountry"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py",
            },
            "cooperations_nantesu.parquet": {
              url: "cooperations_nantesu.parquet",
            },
          },
          streamlitConfig: {
            "server.address": "localhost",
            "global.developmentMode": false,
          }
        },
        document.getElementById("root")
      ).then(() => {
        document.getElementById("loading").style.display = "none";
      });
    </script>
  </body>
</html>
